    <script>
        // Ngày bắt đầu yêu nhau
        const startDate = new Date("2023-12-24"); // Thay đổi ngày này thành ngày của bạn
        const loveDaysElement = document.getElementById("loveDays");

        // Hàm tính số ngày yêu nhau
        function calculateLoveDays() {
            const today = new Date();
            const timeDifference = today - startDate;
            const days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
            loveDaysElement.textContent = `${days} ngày`;
        }

        // Cập nhật số ngày yêu nhau
        calculateLoveDays();
